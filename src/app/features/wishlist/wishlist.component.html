<section class="min-h-screen bg-gray-50 py-10">
  <div class="container mx-auto px-4">

    <!-- Title -->
    @if (wishlist().length > 0) {
      <h2 class="text-4xl font-bold text-green-600 mb-10">
        Your Wishlist
      </h2>

      <!-- Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">

        @for (item of wishlist(); track item._id) {

          <div
            class="group bg-white rounded-2xl shadow-sm hover:shadow-xl transition duration-300 border border-gray-100 overflow-hidden flex flex-col"
          >

            <!-- Image -->
            <div class="relative overflow-hidden">
              <img 
                [routerLink]="['/product-details', item._id]"
                [src]="item.imageCover"
                class="w-full h-96 object-cover cursor-pointer transition duration-500 group-hover:scale-105"
              />

              <!-- Delete Button -->
              <button
                (click)="deleteProductToWishlist(item._id)"
                class="absolute top-3 right-3 w-10 h-10 cursor-pointer flex items-center justify-center
                       bg-white/80 backdrop-blur rounded-full text-red-600
                       opacity-0 group-hover:opacity-100 transition hover:bg-red-600 hover:text-white"
              >
                <i class="fa-solid fa-trash"></i>
              </button>
            </div>

            <!-- Content -->
            <div class="p-5 flex flex-col flex-1">

              <!-- Brand -->
              <span class="text-sm text-amber-600 font-semibold mb-1">
                {{ item.brand?.name || 'Unknown Brand' }}
              </span>

              <!-- Title -->
              <h3 class="font-semibold text-lg leading-snug mb-2 line-clamp-2">
                {{ item.title }}
              </h3>

              <!-- Rating -->
              <div class="mb-3">
                <app-star-rating [rating]="item.ratingsAverage"></app-star-rating>
              </div>

              <!-- Price -->
              <p class="text-green-600 font-bold text-lg mb-4">
                {{ item.price }} EGP
              </p>

              <!-- Button -->
              <a
                [routerLink]="['/product-details', item._id]"
                class="mt-auto text-center bg-green-600 text-white py-2 rounded-xl
                       hover:bg-green-700 transition font-medium"
              >
                View Details
              </a>

            </div>
          </div>

        }

      </div>
    }

    <!-- Empty State -->
    @else {
      <div class="flex flex-col items-center justify-center py-20 text-center">

        <div class="w-28 h-28 rounded-full bg-gray-100 flex items-center justify-center mb-6">
          <i class="fa-solid fa-heart text-gray-300 text-4xl"></i>
        </div>

        <h2 class="text-2xl font-semibold mb-3">
          Your Wishlist is empty
        </h2>

        <p class="text-gray-500 mb-6">
          Start adding products you love
        </p>

        <a
          routerLink="/home"
          class="bg-green-600 text-white px-6 py-3 rounded-xl hover:bg-green-700 transition"
        >
          Start Shopping
        </a>

      </div>
    }

  </div>
</section>
