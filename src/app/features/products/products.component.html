<section>

    <div class="w-full">

        <div class="bg-linear-to-br from-green-500 to-green-600 py-8">
            <div class="container">
                <div class="flex justify-start items-center py-4 gap-4 text-white">
                    <div class="text-2xl p-4 flex bg-gray-50/50 rounded-2xl ms-3">
                        <i class="fa-solid fa-shopping-cart "></i>
                    </div>

                    <div class="flex flex-col justify-center items-start">
                        <h2 class="text-4xl font-bold mb-2">All Products</h2>
                        <p class="text-xl">Explore our complete product collection</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 mt-5 mx-3">
        @for (product of productList(); track $index) {
        <app-single-card [data]="product"></app-single-card>
        }
    </div>
</section>
