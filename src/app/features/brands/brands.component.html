<section>
    <!-- HEADER -->
    <div class="bg-gradient-to-br from-purple-600 to-purple-400 text-white">
        <div class="container mx-auto px-4 py-12">

            <!-- Breadcrumb -->
            <nav class="flex items-center gap-2 text-sm text-white/80 mb-6">
                <a routerLink="/home" class="hover:text-white">Home</a>
                <span>/</span>
                <span class="font-medium">Brands</span>
            </nav>

            <!-- Title -->
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 rounded-2xl bg-white/20 flex items-center justify-center shadow-lg">
                    <i class="fas fa-tags text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold">Top Brands</h1>
                    <p class="text-white/80">Shop from your favorite brands</p>
                </div>
            </div>

        </div>
    </div>


    <div class="container mx-auto grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-3">

        @for (brand of brandsList() | paginate: { id: 'brandPagination',
        itemsPerPage: pageSize(),
        currentPage: p(),
        totalItems: total() }; track brand._id;) {
        <a (click)="getSpecificBrand(brand._id)"
            class="group block bg-white rounded-2xl my-4 border cursor-pointer border-gray-100 p-4 sm:p-5 shadow-sm hover:shadow-xl hover:border-violet-200 transition-all duration-300 hover:-translate-y-1">

            <div class="aspect-square rounded-xl overflow-hidden bg-gray-50 mb-3 p-4 flex items-center justify-center">
                <img [alt]="brand.name"
                    class="w-full h-full object-contain group-hover:scale-110 transition-transform duration-500"
                    [src]="brand.image">
            </div>

            <h3
                class="font-semibold text-gray-900 text-center text-sm group-hover:text-violet-600 transition-colors truncate">
                {{brand.name}}
            </h3>

            <div class="flex justify-center mt-1.5 opacity-0 group-hover:opacity-100 transition-opacity">
                <span class="text-xs text-violet-600 flex items-center gap-1">
                    View Products
                    <i class="fa-solid fa-arrow-right"></i>
                </span>
            </div>

        </a>
        }


    </div>


    <div class="my-5 flex justify-center">
        <pagination-controls class="my-pagination" id="brandPagination" (pageChange)="getAllBrands($event)">
        </pagination-controls>
    </div>
</section>
